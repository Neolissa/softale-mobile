name: Deploy Web To GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export Expo web build
        env:
          EXPO_PUBLIC_AUTH_MODE: server
          EXPO_PUBLIC_ECONOMY_MODE: server
          EXPO_PUBLIC_ECONOMY_API_BASE_URL: https://softale-mobile.onrender.com
        run: npm run web:build

      - name: Rewrite asset paths for GitHub Pages subpath
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          sed -i "s|href=\"/|href=\"/${REPO_NAME}/|g" dist/index.html
          sed -i "s|src=\"/|src=\"/${REPO_NAME}/|g" dist/index.html
          find dist/_expo/static/js/web -type f -name "index-*.js" -exec sed -i "s|\"/assets/|\"/${REPO_NAME}/assets/|g" {} +

      - name: Add SPA fallback page
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
